<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
            <section class="formulario">
            <h2>Cadastre-se</h2>
            <p>Crie sua conta e aproveite ofertas exclusivas</p>
            
            <form method="post" action="url">
               <label for="nome">Nome Completo</label><br>
               <input type="text" name="nome" size="40"><br>
               
               <label for="email">E-mail</label><br>
               <input type="email" name="email" size="40"><br>
               
               <label for="senha">Senha</label><br>
               <input type="password" name="senha" size="40"><br>
               
               <label for="senha">Confirmar Senha</label><br>
               <input type="password" name="senha" size="40"><br>
               
               <spam class= "conta">
                    <input type="checkbox" class="aceito">
                    <label for="checkbox" class="aceito">Aceito os termos de uso e política de privacidade</label>
               </spam>
               
               <spam id="envio"><br>
                    <input id="conta" type="submit" value="Criar Conta">
               </spam>
            </form>
        </section>
</body>
</html>
